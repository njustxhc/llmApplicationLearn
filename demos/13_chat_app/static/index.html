<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>与大模型对话</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #1a1b26;
      color: #c0caf5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 12px 20px;
      border-bottom: 1px solid #3b4261;
      font-size: 1rem;
      font-weight: 600;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }
    .msg {
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      max-width: 100%;
    }
    .msg.user {
      flex-direction: row;
      margin-left: 24px;
    }
    .msg.assistant {
      flex-direction: row;
      margin-right: 24px;
    }
    .msg-icon {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .msg.user .msg-icon {
      background: #3b4261;
      color: #a9b1d6;
    }
    .msg.assistant .msg-icon {
      background: #414868;
      color: #7aa2f7;
    }
    .msg-icon svg {
      width: 18px;
      height: 18px;
    }
    .msg-bubble {
      flex: 1;
      min-width: 0;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: #24283b;
      border: 1px solid #3b4261;
    }
    .msg.assistant .msg-bubble {
      background: #2d3047;
      border: 1px solid #414868;
    }
    .msg-bubble .content {
      display: block;
    }
    .input-area {
      padding: 16px;
      border-top: 1px solid #3b4261;
      background: #1a1b26;
    }
    .input-wrap {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .search-opt {
      max-width: 720px;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-opt label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #a9b1d6;
    }
    .search-opt input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #7aa2f7;
    }
    #userInput {
      flex: 1;
      min-height: 44px;
      max-height: 160px;
      padding: 10px 14px;
      border: 1px solid #3b4261;
      border-radius: 10px;
      background: #24283b;
      color: #c0caf5;
      font-size: 0.95rem;
      resize: none;
      font-family: inherit;
    }
    #userInput:focus {
      outline: none;
      border-color: #7aa2f7;
    }
    #userInput::placeholder {
      color: #565f89;
    }
    #sendBtn {
      padding: 10px 20px;
      min-height: 44px;
      border: none;
      border-radius: 10px;
      background: #7aa2f7;
      color: #1a1b26;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    #sendBtn:hover:not(:disabled) {
      background: #89b4fa;
    }
    #sendBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      color: #f7768e;
      font-size: 0.9rem;
      margin-top: 8px;
    }
    .typing {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <header class="header">与大模型对话</header>
  <div id="messages"></div>
  <div class="input-area">
    <div class="search-opt">
      <label>
        <input type="checkbox" id="useSearch" />
        联网搜索（先检索再回答）
      </label>
      <label>
        <input type="checkbox" id="useMcp" />
        使用 MCP 工具（如获取天气）
      </label>
      <label>
        <input type="checkbox" id="useRagDoc" />
        文档 RAG（从本地文档检索后回答）
      </label>
    </div>
    <div class="input-wrap">
      <textarea id="userInput" rows="1" placeholder="输入消息，按 Enter 发送..." autofocus></textarea>
      <button id="sendBtn" type="button">发送</button>
    </div>
    <div id="error" class="error"></div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const errorEl = document.getElementById("error");

    const iconUser = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
    const iconAssistant = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="10" r="6"/><circle cx="9" cy="9" r="1.2"/><circle cx="15" cy="9" r="1.2"/><path d="M8 13.5 Q12 16 16 13.5" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>';

    let messages = [];

    function addMessage(role, content, isStreaming = false) {
      const div = document.createElement("div");
      div.className = "msg " + role + (isStreaming ? " typing" : "");
      const icon = role === "user" ? iconUser : iconAssistant;
      div.innerHTML = '<span class="msg-icon">' + icon + '</span><div class="msg-bubble"><span class="content">' + escapeHtml(content) + '</span></div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div.querySelector(".content");
    }

    function escapeHtml(text) {
      const p = document.createElement("p");
      p.textContent = text;
      return p.innerHTML.replace(/\n/g, "<br>");
    }

    function setError(msg) {
      errorEl.textContent = msg || "";
    }

    async function sendStreaming(userText) {
      messages.push({ role: "user", content: userText });
      addMessage("user", userText);

      const assistantContentEl = addMessage("assistant", "", true);
      let fullContent = "";

      const useSearch = document.getElementById("useSearch").checked;
      const useMcp = document.getElementById("useMcp").checked;
      const useRagDoc = document.getElementById("useRagDoc").checked;
      const body = { messages, stream: true };
      if (useSearch) {
        body.use_search = true;
        body.search_query = userText;
      }
      if (useMcp) body.use_mcp = true;
      if (useRagDoc) body.use_rag_doc = true;
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        assistantContentEl.closest(".msg").remove();
        setError(err.error || "请求失败");
        messages.pop();
        return;
      }
      setError("");

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split("\n").filter((l) => l.startsWith("data: "));
        for (const line of lines) {
          const data = line.slice(6);
          if (data === "[DONE]") continue;
          try {
            const obj = JSON.parse(data);
            if (obj.content) {
              fullContent += obj.content;
              assistantContentEl.innerHTML = escapeHtml(fullContent);
              assistantContentEl.closest(".msg").classList.remove("typing");
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          } catch (_) {}
        }
      }
      messages.push({ role: "assistant", content: fullContent });
    }

    async function send() {
      const text = userInput.value.trim();
      if (!text) return;
      userInput.value = "";
      sendBtn.disabled = true;
      setError("");
      await sendStreaming(text);
      sendBtn.disabled = false;
      userInput.focus();
    }

    sendBtn.addEventListener("click", send);
    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
  </script>
</body>
</html>
